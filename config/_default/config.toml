baseurl = "https://starter.stack.cai.im/"
locale = "zh-cn"
title = "资源共享站"
defaultContentLanguage = "zh-cn"
hasCJKLanguage = true

[languages]
    [languages.zh-cn]
        languageName = "简体中文"
        title = "资源共享站"
        weight = 1

        [[languages.zh-cn.menu.main]]
            identifier = "home"
            name       = "首页"
            url        = "/"
            weight     = 1
            [languages.zh-cn.menu.main.params]
                icon = "home"

        [[languages.zh-cn.menu.main]]
            identifier = "archives"
            name       = "资源归档"
            url        = "/archives/"
            weight     = 2
            [languages.zh-cn.menu.main.params]
                icon = "archive"

        [[languages.zh-cn.menu.main]]
            identifier = "search"
            name       = "搜索资源"
            url        = "/search/"
            weight     = 3
            [languages.zh-cn.menu.main.params]
                icon = "search"

        [[languages.zh-cn.menu.main]]
            identifier = "links"
            name       = "友情链接"
            url        = "/links/"
            weight     = 4
            [languages.zh-cn.menu.main.params]
                icon = "link"

[pagination]
    pagerSize = 5
